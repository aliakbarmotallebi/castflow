services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: castflow
      POSTGRES_PASSWORD: castflow
      POSTGRES_DB: castflow
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U castflow -d castflow"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --save 20 1 --maxmemory-policy noeviction
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  asynqmon:
    image: hibiken/asynqmon:latest
    ports:
      - "3000:8080"
    command:
      - --redis-addr=redis:6379
      - --redis-db=0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  rustfs_perms:
    image: alpine:3.20
    user: root
    volumes:
      - rustfsdata:/data
    command: chown -R 10001:10001 /data
    restart: "no"

  rustfs:
    image: rustfs/rustfs:latest
    depends_on:
      rustfs_perms:
        condition: service_completed_successfully
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ACCESS_KEY: minioadmin
      RUSTFS_SECRET_KEY: minioadmin
    volumes:
      - rustfsdata:/data
    command: ["/data"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  castflow:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: castflow:latest
    ports:
      - "8080:8080"
    env_file:
      - ../.env
    environment:
      CASTFLOW_HTTP_ADDR: ":8080"
      CASTFLOW_DATABASE_URL: postgres://castflow:castflow@postgres:5432/castflow?sslmode=disable
      CASTFLOW_REDIS_URL: redis://redis:6379/0
      CASTFLOW_STORAGE_LOCAL_DIR: /app/data/storage
      CASTFLOW_TEMP_DIR: /app/data/tmp
      CASTFLOW_CDN_BASE_URL: http://localhost:8080/media
      CASTFLOW_PLAYER_BASE_URL: http://localhost:8080/player
      CASTFLOW_API_BASE_URL: http://localhost:8080
      CASTFLOW_ENABLE_EMBEDDED_WORKER: "false"
    volumes:
      - castflow_storage:/app/data/storage
      - castflow_tmp:/app/data/tmp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  castflow-worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: castflow:latest
    command: ["/app/worker"]
    env_file:
      - ../.env
    environment:
      CASTFLOW_DATABASE_URL: postgres://castflow:castflow@postgres:5432/castflow?sslmode=disable
      CASTFLOW_REDIS_URL: redis://redis:6379/0
      CASTFLOW_STORAGE_LOCAL_DIR: /app/data/storage
      CASTFLOW_TEMP_DIR: /app/data/tmp
    volumes:
      - castflow_storage:/app/data/storage
      - castflow_tmp:/app/data/tmp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  rustfsdata:
  castflow_storage:
  castflow_tmp:
